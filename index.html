<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精神状态鉴定中心</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg: #0a0614;
    --surface: #1a0a2e;
    --surface-light: #2d1b4e;
    --text: #ffffff;
    --text-dim: #94a3b8;
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    --blue: #3b82f6;
    --blue-light: #60a5fa;
    --gold: #fbbf24;
    --gradient: linear-gradient(135deg, #7c3aed, #3b82f6);
  }

  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(167,139,250,0.05) 0%, transparent 70%);
  }

  canvas#bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.6;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- Screens --- */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    animation: glitchSlideIn 0.6s ease;
  }
  .screen.active { display: flex; }

  @keyframes glitchSlideIn {
    0% { opacity: 0; transform: translateY(30px) skewX(-2deg); }
    30% { opacity: 0.3; transform: translateY(-5px) skewX(1deg); }
    60% { opacity: 0.7; transform: translateY(3px) skewX(-0.5deg); }
    100% { opacity: 1; transform: translateY(0) skewX(0); }
  }

  /* --- Intro --- */
  .symbol {
    font-size: 4.5rem;
    margin-bottom: 1.25rem;
    animation: skullWobble 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,20,147,0.5));
    cursor: default;
  }

  @keyframes skullWobble {
    0%, 100% { transform: rotate(0deg) scale(1); }
    15% { transform: rotate(3deg) scale(1.08); }
    30% { transform: rotate(-2deg) scale(1.04); }
    45% { transform: rotate(1deg) scale(1.1); }
    60% { transform: rotate(-1deg) scale(1.02); }
    75% { transform: rotate(0.5deg) scale(1.06); }
  }

  h1 {
    font-family: "Courier New", monospace;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    margin-bottom: 1rem;
    text-align: center;
    text-transform: uppercase;
    color: var(--pink);
    text-shadow: 2px 2px 0 var(--green), -2px -2px 0 var(--blue);
    animation: titleGlitch 4s ease-in-out infinite;
  }

  @keyframes titleGlitch {
    0%, 90%, 100% { text-shadow: 2px 2px 0 var(--green), -2px -2px 0 var(--blue); }
    91% { text-shadow: -3px 1px 0 var(--pink), 3px -1px 0 var(--green); }
    93% { text-shadow: 4px -2px 0 var(--blue), -1px 3px 0 var(--yellow); }
    95% { text-shadow: 2px 2px 0 var(--green), -2px -2px 0 var(--blue); }
  }

  .subtitle {
    font-family: "Courier New", monospace;
    font-size: 0.9rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 2;
    max-width: 460px;
    margin-bottom: 2.5rem;
    border-left: 3px solid var(--green-dim);
    padding-left: 1rem;
    background: rgba(57,255,20,0.03);
  }

  .btn {
    background: transparent;
    border: 2px solid var(--purple);
    color: var(--purple-light);
    padding: 0.8rem 2.5rem;
    font-family: "Noto Serif SC", serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    text-transform: uppercase;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .btn:hover {
    background: var(--gradient);
    color: #fff;
    box-shadow:
      0 0 30px rgba(124,58,237,0.5),
      0 0 60px rgba(59,130,246,0.2),
      inset 0 0 30px rgba(0,0,0,0.3);
    animation: btnShake 0.15s ease-in-out;
  }
  .btn:active { transform: scale(0.95); }

  @keyframes btnShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  /* --- Progress --- */
  .progress-wrap {
    width: 100%;
    margin-bottom: 2.5rem;
  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--green), var(--blue));
    background-size: 200% 100%;
    animation: progressPulse 1s linear infinite;
    transition: width 0.4s ease;
  }
  @keyframes progressPulse {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .progress-num {
    text-align: right;
    font-family: "Courier New", monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    letter-spacing: 0.15em;
  }

  /* --- Question --- */
  #screen-question {
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .question-text {
    font-family: "Courier New", monospace;
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 2;
    text-align: center;
    margin-bottom: 2.5rem;
    min-height: 4em;
    display: flex;
    align-items: center;
    position: relative;
  }
  .question-text::before {
    content: '>>>';
    position: absolute;
    left: -2rem;
    color: var(--green);
    opacity: 0.5;
    font-size: 0.8rem;
    animation: cursorBlink 0.8s step-end infinite;
  }
  @keyframes cursorBlink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
  }

  .choice {
    background: var(--surface);
    border: 2px solid rgba(124,58,237,0.2);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    font-family: "Noto Serif SC", serif;
    font-size: 0.9rem;
    color: var(--text);
    letter-spacing: 0.03em;
    line-height: 1.7;
    position: relative;
    border-radius: 2px 12px 2px 12px;
  }
  .choice:hover {
    border-color: var(--purple);
    background: rgba(124,58,237,0.1);
    transform: translateX(4px);
    box-shadow: -4px 0 0 rgba(124,58,237,0.3);
  }
  .choice:active {
    transform: scale(0.97);
  }
  .choice .letter {
    display: inline-block;
    font-family: "Courier New", monospace;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--pink-dim);
    letter-spacing: 0.2em;
    margin-right: 0.5rem;
    padding: 2px 6px;
    border: 1px solid rgba(255,20,147,0.3);
  }
  .choice:nth-child(2) .letter {
    color: var(--green-dim);
    border-color: rgba(57,255,20,0.3);
  }

  /* --- Results --- */
  .result-type {
    font-family: "Noto Serif SC", serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--blue-light);
    margin-bottom: 0.75rem;
    text-shadow: 0 0 10px rgba(59,130,246,0.5);
  }

  .result-name {
    font-family: "Noto Serif SC", serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
    text-align: center;
    color: var(--gold);
    text-shadow:
      0 0 20px rgba(251,191,36,0.6),
      0 0 40px rgba(251,191,36,0.2);
  }
  @keyframes nameGlitch {
    0%, 92%, 100% { transform: translate(0); }
    93% { transform: translate(-3px, 1px); }
    94% { transform: translate(3px, -1px); }
    96% { transform: translate(0); }
  }

  .result-subtitle {
    font-family: "Courier New", monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 2rem;
    border-bottom: 1px dashed rgba(255,255,255,0.1);
    padding-bottom: 1rem;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2rem;
    width: 100%;
    margin-bottom: 1.5rem;
    border-image: linear-gradient(45deg, var(--pink-dim), var(--green-dim)) 1;
  }

  .result-section {
    margin-bottom: 1.75rem;
  }
  .result-section:last-child { margin-bottom: 0; }

  .result-label {
    font-family: "Courier New", monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--pink);
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    border-left: 3px solid var(--pink);
    padding-left: 0.8rem;
  }

  .result-text {
    font-family: "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    font-size: 0.95rem;
    line-height: 2;
    color: var(--text);
  }

  .result-dimensions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1.5rem 0;
    justify-content: center;
  }

  .dim-tag {
    font-family: "Courier New", monospace;
    font-size: 0.75rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.1em;
    color: var(--text-dim);
    background: rgba(255,255,255,0.02);
    transition: all 0.2s ease;
  }
  .dim-tag.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(57,255,20,0.06);
    text-shadow: 0 0 8px rgba(57,255,20,0.3);
  }

  .btn-restart {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    padding: 0.5rem 1.8rem;
    border-color: var(--green-dim);
    color: var(--green-dim);
    clip-path: none;
    border-radius: 2px 10px 2px 10px;
  }
  .btn-restart:hover {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    box-shadow: 0 0 30px rgba(57,255,20,0.5);
  }

  /* 雷达图容器 */
  .radar-container {
    width: 100%;
    max-width: 300px;
    margin: 2rem auto;
    position: relative;
  }

  /* 进度条容器 */
  .progress-bar-container {
    width: 100%;
    margin: 1rem 0;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--gradient);
    border-radius: 4px;
    transition: width 0.5s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .progress-value {
    color: var(--gold);
    font-weight: 700;
  }

  /* --- Responsive --- */
  @media (max-width: 480px) {
    #app { padding: 1.25rem; }
    h1 { font-size: 1.3rem; letter-spacing: 0.15em; }
    .question-text { font-size: 1rem; }
    .question-text::before { display: none; }
    .result-name { font-size: 1.6rem; }
    .symbol { font-size: 3.5rem; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">
  <!-- Intro Screen -->
  <div class="screen active" id="screen-intro">
    <div class="symbol">💀</div>
    <h1>精神状态鉴定中心</h1>
    <p class="subtitle">
      本测试没有任何科学依据。<br>
      本测试的题目可能让你觉得"这什么鬼"。<br>
      但做完之后你可能觉得自己被看穿了。<br>
      这很正常。这不是你疯了。是世界疯了。
    </p>
    <button class="btn" onclick="startQuiz()">开始鉴定</button>
  </div>

  <!-- Question Screen -->
  <div class="screen" id="screen-question">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-num" id="progress-num">1 / 20</div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="result-type" id="result-type"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="result-dimensions" id="result-dimensions"></div>
    <div class="result-card" id="result-card"></div>
    <button class="btn btn-restart" onclick="restartQuiz()">重新测试</button>
  </div>
</div>

<script>
// ── Background Canvas — Glitch Noise ───────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let w, h;
const glitchBlocks = [];
const binaryRain = [];
const colors = ['rgba(255,20,147,', 'rgba(57,255,20,', 'rgba(0,229,255,', 'rgba(255,225,0,'];

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Glitch rectangles that occasionally flash across screen
for (let i = 0; i < 12; i++) {
  glitchBlocks.push({
    x: Math.random() * w,
    y: Math.random() * h,
    w: Math.random() * 60 + 10,
    h: Math.random() * 4 + 1,
    opacity: 0,
    targetOpacity: 0,
    color: colors[Math.floor(Math.random() * colors.length)],
    delay: Math.random() * 300,
    timer: Math.random() * 300
  });
}

// Binary-like falling characters
for (let i = 0; i < 30; i++) {
  binaryRain.push({
    x: Math.random() * w,
    y: Math.random() * h,
    char: Math.random() > 0.5 ? '1' : '0',
    speed: Math.random() * 0.4 + 0.1,
    opacity: Math.random() * 0.15 + 0.03,
    size: Math.random() * 10 + 8,
    color: Math.random() > 0.7 ? 'rgba(57,255,20,' : 'rgba(255,20,147,'
  });
}

function drawGlitchBlock(block) {
  block.timer++;
  if (block.timer > block.delay) {
    block.timer = 0;
    block.delay = Math.random() * 400 + 200;
    block.targetOpacity = Math.random() > 0.7 ? Math.random() * 0.3 + 0.1 : 0;
    block.x = Math.random() * w;
    block.y = Math.random() * h;
    block.w = Math.random() * 120 + 20;
  }
  block.opacity += (block.targetOpacity - block.opacity) * 0.1;
  if (block.opacity < 0.005) return;

  ctx.fillStyle = block.color + (block.opacity * 0.4) + ')';
  ctx.fillRect(block.x, block.y, block.w, block.h);
  // shadow copy shifted
  ctx.fillStyle = block.color + (block.opacity * 0.15) + ')';
  ctx.fillRect(block.x + 4, block.y + 1, block.w, block.h);
  ctx.fillRect(block.x - 4, block.y - 2, block.w, block.h);
}

function drawBinaryRain(drop) {
  drop.y += drop.speed;
  if (drop.y > h + 20) {
    drop.y = -20;
    drop.x = Math.random() * w;
    drop.char = Math.random() > 0.5 ? '1' : '0';
    drop.opacity = Math.random() * 0.12 + 0.02;
  }
  ctx.font = `${drop.size}px "Courier New", monospace`;
  ctx.fillStyle = drop.color + drop.opacity + ')';
  ctx.fillText(drop.char, drop.x, drop.y);
}

function drawNoise() {
  // subtle full-screen noise — only on ~5% of pixels for perf
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 160) {
    const v = Math.random() > 0.995 ? Math.random() * 20 : 0;
    data[i] = v;
    data[i + 1] = v * 0.6;
    data[i + 2] = v * 0.3;
    data[i + 3] = Math.random() * 15;
  }
  ctx.putImageData(imageData, 0, 0);
}

function drawScanLines() {
  ctx.fillStyle = 'rgba(0,0,0,0.015)';
  for (let y = 0; y < h; y += 4) {
    ctx.fillRect(0, y, w, 1);
  }
}

function animate() {
  ctx.clearRect(0, 0, w, h);
  binaryRain.forEach(d => drawBinaryRain(d));
  glitchBlocks.forEach(b => drawGlitchBlock(b));
  drawNoise();
  drawScanLines();
  requestAnimationFrame(animate);
}
animate();

// ── Data ───────────────────────────────────────────────

const dimensions = [
  {
    key: 'LifeForce',
    labels: ['微死', '疯了'],
    desc: '你的精神状态：微死状态的人已经连续加班三周没有性生活了，但还能呼吸。疯了的人今天在地铁上突然笑出声来，因为想起了三年前的一个梗。'
  },
  {
    key: 'ActionMode',
    labels: ['卷死', '开摆'],
    desc: '你与世界较劲的方式：卷死的人会在凌晨三点醒来改PPT。开摆的人会在下午三点醒来，发现PPT还没新建——并且觉得无所谓。'
  },
  {
    key: 'ValueCore',
    labels: ['要钱', '开心'],
    desc: '你觉得活着到底图什么：要钱的人看到夕阳第一反应是拍下来P图卖素材。开心的人看到夕阳第一反应是——卧槽好美，然后就站在那儿看了十分钟。'
  },
  {
    key: 'SocialMode',
    labels: ['已读不回', '随地大小演'],
    desc: '你的社交电量：已读不回的人拥有一项超能力——让所有聊天框在TA的注视下安静地腐烂。随地大小演的人拥有一项不同的超能力——在没有观众的情况下依然能演完一整场舞台剧。'
  }
];

const questions = [
  // LifeForce — 微死 vs 疯了
  {
    dim: 0, pole: 0,
    text: '你在马桶上坐了30分钟，便秘还没解决，此时你在想什么？',
    a: '算了，反正拉出来也是冲走，何必强求。', b: '我的人生就像这坨屎——明明感觉要出来了但就是出不来啊啊啊啊啊！！'
  },
  {
    dim: 0, pole: 0,
    text: '周五晚上十点，你躺在床上。你的身体告诉你应该起来做点什么，你的大脑说——',
    a: '不。', b: '走！去吃凌晨三点的涮羊肉！然后去看日出！然后直接上班！！'
  },
  {
    dim: 0, pole: 0,
    text: '你发现自己连续三天穿了同一件T恤。你的反应是？',
    a: '闻了一下，还行，明天继续。', b: '这不是同一件——这是我人格的一部分。这件T恤已经是我了。'
  },
  {
    dim: 0, pole: 0,
    text: '你收到一条消息："在吗？"——后面什么都没有。你？',
    a: '不去想它。如果是急事对方会再发。或者会死。两种结果我都可以接受。', b: '在。在的。一直在。你说。你说啊。你为什么不说了。你到底要说什么。我现在满脑子都是你这个"在吗"。'
  },
  {
    dim: 0, pole: 0,
    text: '你的手机电量显示1%，充电器在三米之外。',
    a: '就这样吧。让它死。我也累了。', b: '不！能！死！！我爬也要爬过去！！！（从床上滚下来，膝盖撞到床头柜，但插上了）'
  },

  // ActionMode — 卷死 vs 开摆
  {
    dim: 1, pole: 0,
    text: '凌晨两点，你发现同事在工作群里发了一条消息。你会？',
    a: '立刻打开电脑开始跟进，并在消息后面跟一条"收到，我今晚处理完"。——不是为了卷，而是你控制不住。', b: '把手机翻过去，心想"TA卷TA的，关我屁事"，然后继续刷小红书。'
  },
  {
    dim: 1, pole: 0,
    text: '你有一个重要的任务明天要交。现在是晚上十点，你的进度是？',
    a: '已经做完了三版方案，正在做第四版，因为第三版"还不够好"。', b: '还没开始。但你已经想好了五个明天早上可以用的借口。其中有三个是真实的。'
  },

// ── State ──────────────────────────────────────────────
let currentQuestion = 0;
let scores = [0, 0, 0, 0]; // +1 for pole 1, -1 for pole 0 per question answered
let answers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questionOrder = [];

// ── Navigation ─────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startQuiz() {
  currentQuestion = 0;
  scores = [0, 0, 0, 0];
  answers = [];
  questionOrder = shuffle([...Array(questions.length).keys()]);
  showScreen('question');
  renderQuestion();
}

function restartQuiz() {
  showScreen('intro');
}

// ── Render Question ────────────────────────────────────
function renderQuestion() {
  const qi = questionOrder[currentQuestion];
  const q = questions[qi];

  document.getElementById('progress-fill').style.width = ((currentQuestion / questions.length) * 100) + '%';
  document.getElementById('progress-num').textContent = (currentQuestion + 1) + ' / ' + questions.length;
  document.getElementById('question-text').textContent = q.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  [q.a, q.b].forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="letter">选项 ${idx === 0 ? 'A' : 'B'}</span>${choice}`;
    btn.addEventListener('click', () => answer(qi, idx));
    choicesEl.appendChild(btn);
  });
}

function answer(questionIndex, choice) {
  const q = questions[questionIndex];
  // choice 0 = pole 0, choice 1 = pole 1
  scores[q.dim] += choice === 0 ? -1 : 1;
  answers.push({ question: questionIndex, choice });

  currentQuestion++;
  if (currentQuestion >= questions.length) {
    showResult();
  } else {
    // fade transition
    const screen = document.getElementById('screen-question');
    screen.style.opacity = '0';
    screen.style.transform = 'translateY(12px)';
    setTimeout(() => {
      renderQuestion();
      screen.style.opacity = '1';
      screen.style.transform = 'translateY(0)';
    }, 300);
  }
}

// ── Results ────────────────────────────────────────────
function showResult() {
  // Build type key: for each dimension, 0 if score < 0, 1 if score >= 0
  const key = scores.map(s => s >= 0 ? '1' : '0').join('');
  const archetype = archetypes[key];

  document.getElementById('result-type').textContent = archetype.typeCode;
  document.getElementById('result-name').textContent = archetype.name;
  document.getElementById('result-subtitle').textContent = archetype.subtitle;

  // Dimension tags
  const dimNames = [
    scores[0] >= 0 ? '疯了' : '微死',
    scores[1] >= 0 ? '开摆' : '卷死',
    scores[2] >= 0 ? '开心' : '要钱',
    scores[3] >= 0 ? '随地大小演' : '已读不回'
  ];
  const allDimLabels = [
    ['微死', '疯了'],
    ['卷死', '开摆'],
    ['要钱', '开心'],
    ['已读不回', '随地大小演']
  ];
  let dimsHTML = '';
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 2; j++) {
      const isActive = (scores[i] >= 0 && j === 1) || (scores[i] < 0 && j === 0);
      dimsHTML += `<span class="dim-tag${isActive ? ' active' : ''}">${allDimLabels[i][j]}</span>`;
    }
  }
  document.getElementById('result-dimensions').innerHTML = dimsHTML;

  // Result card
  document.getElementById('result-card').innerHTML = `
    <div class="result-section">
      <div class="result-label">灵魂肖像</div>
      <div class="result-text">${archetype.desc}</div>
    </div>
    <div class="result-section">
      <div class="result-label">人生指引</div>
      <div class="result-text">${archetype.guidance}</div>
    </div>
    <div class="result-section">
      <div class="result-label">哲思</div>
      <div class="result-text" style="font-style:italic">"${archetype.insight}"</div>
    </div>
  `;

  showScreen('result');
}
</script>
