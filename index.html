<script>
// ── Background Canvas — Ink Rain ──────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let w, h;
const inkDrops = [];
const inkChars = '人生在世孤独沉默呐喊彷徨抗争逃避压抑宣泄疏离连接铁屋〇墨';

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 墨色落字/落点
for (let i = 0; i < 36; i++) {
  inkDrops.push({
    x: Math.random() * w,
    y: Math.random() * h,
    char: Math.random() > 0.45 ? inkChars[Math.floor(Math.random() * inkChars.length)] : '·',
    speed: Math.random() * 0.35 + 0.08,
    opacity: Math.random() * 0.10 + 0.03,
    size: Math.random() * 14 + 10,
    drift: (Math.random() - 0.5) * 0.15
  });
}

function drawInkDrop(d) {
  d.y += d.speed;
  d.x += d.drift;
  if (d.y > h + 24 || d.x < -30 || d.x > w + 30) {
    d.y = -24;
    d.x = Math.random() * w;
    d.char = Math.random() > 0.45 ? inkChars[Math.floor(Math.random() * inkChars.length)] : '·';
    d.opacity = Math.random() * 0.10 + 0.03;
  }
  ctx.font = `${d.size}px "Noto Serif SC", serif`;
  ctx.fillStyle = `rgba(31,24,16,${d.opacity})`;
  ctx.fillText(d.char, d.x, d.y);
}

// 性能优化：节流函数
function throttle(func, limit) {
  let inThrottle;
  return function() {
    const args = arguments;
    const context = this;
    if (!inThrottle) {
      func.apply(context, args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

// 优化canvas动画
const animate = throttle(function() {
  ctx.clearRect(0, 0, w, h);
  inkDrops.forEach(d => drawInkDrop(d));
  requestAnimationFrame(animate);
}, 33); // ~30fps，纸面慢节奏，省性能
animate();

// ── Data ───────────────────────────────────────────────

const dimensions = [
  {
    key: 'stress',
    name: '压力应对',

  {

  {

  },
  {
    key: 'decision',
    name: '决策方式',
    labels: ['理性', '感性'],
    desc: '面对选择时，你是依靠逻辑分析，还是依靠直觉感受？'
  }
];

// ── 子维度配置（大五因子映射） ──────────────────
const subfacets = {
  stress: [
    { id: 'anxiety', name: '焦虑倾向', source: '神经质 → 焦虑', weight: 0.3 },
    { id: 'resilience', name: '压力韧性', source: '神经质 → 压力敏感', weight: 0.3 },
    { id: 'action', name: '行动力', source: '尽责性 → 自律', weight: 0.2 },
    { id: 'avoidance', name: '回避倾向', source: '神经质 → 冲动性', weight: 0.2 }
  ],
  emotion: [
    { id: 'awareness', name: '情绪觉察', source: '开放性 → 感受性', weight: 0.3 },
    { id: 'suppression', name: '情绪抑制', source: '神经质 → 冲动性', weight: 0.3 },
    { id: 'release', name: '情绪释放', source: '开放性 → 幻想', weight: 0.2 },
    { id: 'stability', name: '情绪稳定性', source: '神经质 → 情绪性', weight: 0.2 }
  ],
  social: [
    { id: 'energy', name: '社交能量', source: '外向性 → 热情', weight: 0.3 },
    { id: 'trust', name: '信任倾向', source: '宜人性 → 信任', weight: 0.3 },
    { id: 'tolerance', name: '孤独耐受', source: '外向性 → 合群性', weight: 0.2 },
    { id: 'maintenance', name: '关系维护', source: '宜人性 → 顺从', weight: 0.2 }
  ],
  decision: [
    { id: 'logic', name: '逻辑依赖', source: '开放性 → 概念化', weight: 0.3 },
    { id: 'empathy', name: '共情驱动', source: '宜人性 → 利他', weight: 0.3 },
    { id: 'intuition', name: '直觉倾向', source: '开放性 → 幻想', weight: 0.2 },
    { id: 'indecision', name: '决策焦虑', source: '神经质 → 犹豫', weight: 0.2 }
  ]
};

const questionPool = [
  {
    id: 'stress_01', dimension: 'stress', subfacet: 'anxiety', polarity: 'direct',
    leaning: 'escape', difficulty: 'easy', options: 5,
    text: '你的老板在凌晨三点发了一条消息："在吗？"你的第一反应是？',
    optionTexts: ['立刻回复，然后通宵完成任务','回复"在的"，然后继续睡觉','假装没看见，明天再说','打开招聘软件看了一眼','把老板拉黑，然后继续睡觉'],
    scoring: null

  {

    text: '你被同事甩锅了，你？',
    optionTexts: ['当面指出问题，要求道歉','私下找同事沟通','算了，不计较','在朋友圈发阴阳怪气的内容','越级汇报'],
    scoring: null
  },
  {
    id: 'stress_03', dimension: 'stress', subfacet: 'action', polarity: 'direct',
    leaning: 'fight', difficulty: 'boundary', options: 5,

// ── Scoring Configuration ──────────────────────────────
const scoringConfig = {
  confidenceThreshold: 1.0,
  maxQuestions: 30,
  minQuestions: 21,
  validityCheckCount: 3,
  dimensions: {
    stress: { min: 0, max: 100 },
    emotion: { min: 0, max: 100 },
    social: { min: 0, max: 100 },
    decision: { min: 0, max: 100 }
  },
  composite: {
    socialAdapt: 0.3,
    mentalHealth: 0.3,
    emotionalStability: 0.2,
    socialHealth: 0.1,
    decisionHealth: 0.1
  }
};

let currentQuestion = null;

// ── URL 参数处理 ─────────────────────────────

  const params = new URLSearchParams(window.location.search);
  return params.get(key);
}

function setUrlParam(key, value) {
  const url = new URL(window.location);
  url.searchParams.set(key, value);
  history.replaceState(null, '', url);
}

function startQuiz() {
  adaptiveState = {

    validityAnswers: [],
    currentDimension: null,

  };
  questionCount = 0;
  showScreen('question');

// ── Render Question ────────────────────────────────────
function renderQuestion() {
  if (!currentQuestion) return;
  const q = currentQuestion;
  document.getElementById('progress-num').textContent = '第 ' + (questionCount + 1) + ' 题';
  const estimatedProgress = Math.min((questionCount / scoringConfig.maxQuestions) * 100, 95);
  document.getElementById('progress-fill').style.width = estimatedProgress + '%';
  document.getElementById('question-text').textContent = q.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  q.optionTexts.forEach((text, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="letter">〇</span>${text}`;
    btn.addEventListener('click', () => answer(idx));
    choicesEl.appendChild(btn);
  });
}

function answer(optionIndex) {
  const q = currentQuestion;

  if (q.dimension === 'validity') {
    adaptiveState.validityAnswers.push({
      questionId: q.id,
      expected: q.validityCheck,
      actual: optionIndex
    });
  } else {
    const likertScore = applyPolarity(getLikertScore(optionIndex, q), q);
    adaptiveState.dimensionAnswers[q.dimension].push(likertScore);
    if (!adaptiveState.subfacetCoverage[q.dimension]) {
      adaptiveState.subfacetCoverage[q.dimension] = {};
    }
    adaptiveState.subfacetCoverage[q.dimension][q.subfacet] = true;
  }

  adaptiveState.askedQuestions.push(q.id);
  adaptiveState.questionCount++;
  questionCount++;

  const screen = document.getElementById('screen-question');
  screen.style.opacity = '0';
  screen.style.transform = 'translateY(12px)';

  setTimeout(() => {
    const phase = determinePhase();
    if (phase === 'done' || (phase === 'validity' && adaptiveState.askedQuestions.filter(id => id.startsWith('validity')).length >= scoringConfig.validityCheckCount)) {
      showResult();
      return;
    }
    currentQuestion = selectNextQuestion();
    if (!currentQuestion) {
      showResult();
      return;
    }
    renderQuestion();
    screen.style.opacity = '1';
    screen.style.transform = 'translateY(0)';
  }, 300);
}

// ── Likert Scoring Engine ──────────────────────────────

/**
 * 将选项索引（0-based）转换为Likert分数（1-5），根据选项数量进行映射
 * @param {number} optionIndex - 0-based选项索引
 * @param {object} question - 题目对象，包含options（选项数量）
 * @returns {number} Likert分数（1-5范围）
 */
function getLikertScore(optionIndex, question) {
  const n = question.options;
  if (n === 5) {
    return optionIndex + 1;
  } else if (n === 6) {
    const mapping = [1, 2, 2.67, 3.33, 4, 5];
    return mapping[optionIndex];
  } else if (n === 4) {
    return (optionIndex) * (4 / 3) + 1;
  }
  return optionIndex + 1;
}

/**
 * 应用极性反转：若question.polarity === 'reverse'，则反转评分
 * @param {number} score - Likert分数
 * @param {object} question - 题目对象，包含polarity字段
 * @returns {number} 应用极性后的分数
 */
function applyPolarity(score, question) {
  if (question.polarity === 'reverse') {
    return 6 - score;
  }
  return score;
}

/**
 * 计算答案列表的标准差，用于衡量置信度
 * 标准差越小，说明答案越一致，置信度越高
 * @param {number[]} dimensionAnswers - 某维度的Likert分数数组
 * @returns {number} 标准差（<2个数据时返回Infinity）
 */
function calculateConfidence(dimensionAnswers) {
  if (dimensionAnswers.length < 2) return Infinity;
  const mean = dimensionAnswers.reduce((s, v) => s + v, 0) / dimensionAnswers.length;
  const variance = dimensionAnswers.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / dimensionAnswers.length;
  return Math.sqrt(variance);
}

/**
 * 将答案数组的原始分数标准化到0-100的维度指数
 * @param {number[]} answers - 某维度的Likert分数数组（每项1-5）
 * @returns {number} 标准化后的维度指数（0-100）
 */
function calculateDimensionIndex(answers) {
  if (answers.length === 0) return 50;
  const minPossible = answers.length * 1;
  const maxPossible = answers.length * 5;
  const rawScore = answers.reduce((s, v) => s + v, 0);
  return Math.round(((rawScore - minPossible) / (maxPossible - minPossible)) * 100);
}

function calculateCompositeScores(dimensionIndices) {
  const socialAdapt = Math.round(
    (dimensionIndices.stress * 0.3) +
    (dimensionIndices.emotion * 0.3) +
    (dimensionIndices.social * 0.2) +
    (dimensionIndices.decision * 0.2)
  );

  const mentalHealth = Math.round(
    (dimensionIndices.emotion * 0.4) +
    (dimensionIndices.stress * 0.3) +
    (dimensionIndices.social * 0.3)
  );

  const emotionalStability = Math.round(
    (100 - Math.abs(dimensionIndices.emotion - 50)) * 0.5 +
    (100 - Math.abs(dimensionIndices.stress - 50)) * 0.5
  );

  const socialHealth = Math.round(
    (dimensionIndices.social * 0.6) +
    (dimensionIndices.emotion * 0.4)
  );

  const decisionHealth = Math.round(
    (dimensionIndices.decision * 0.6) +
    (dimensionIndices.stress * 0.4)
  );

  return {
    socialAdapt,
    mentalHealth,
    emotionalStability,
    socialHealth,
    decisionHealth
  };
}

function calculateOverallScore(compositeScores) {
  return Math.round(
    (compositeScores.socialAdapt * scoringConfig.composite.socialAdapt) +
    (compositeScores.mentalHealth * scoringConfig.composite.mentalHealth) +
    (compositeScores.emotionalStability * scoringConfig.composite.emotionalStability) +
    (compositeScores.socialHealth * scoringConfig.composite.socialHealth) +
    (compositeScores.decisionHealth * scoringConfig.composite.decisionHealth)
  );
}

// ── Adaptive Engine ────────────────────────────────────

let adaptiveState = {
  phase: 'explore',
  askedQuestions: [],
  dimensionAnswers: { stress: [], emotion: [], social: [], decision: [] },
  subfacetCoverage: { stress: {}, emotion: {}, social: {}, decision: {} },
  validityAnswers: [],
  currentDimension: null,
  questionCount: 0
};

function determinePhase() {
  const state = adaptiveState;
  if (state.questionCount >= scoringConfig.maxQuestions - scoringConfig.validityCheckCount) {
    return 'validity';
  }
  if (state.questionCount < 8) {
    return 'explore';
  }
  const allConfident = ['stress', 'emotion', 'social', 'decision'].every(d => {
    return calculateConfidence(state.dimensionAnswers[d]) < scoringConfig.confidenceThreshold
      || state.dimensionAnswers[d].length >= 5;
  });
  if (allConfident) {
    return state.questionCount < scoringConfig.minQuestions ? 'confirm' : 'validity';
  }
  if (state.questionCount >= scoringConfig.minQuestions - scoringConfig.validityCheckCount) {
    return 'confirm';
  }
  return 'discriminate';
}

function selectNextDimension() {
  const state = adaptiveState;
  const dimensions = ['stress', 'emotion', 'social', 'decision'];
  const scored = dimensions.map(d => ({
    dimension: d,
    confidence: calculateConfidence(state.dimensionAnswers[d]),
    count: state.dimensionAnswers[d].length
  }));

  if (state.phase === 'explore') {
    return scored.sort((a, b) => a.count - b.count)[0].dimension;
  }
  if (state.phase === 'discriminate') {
    return scored.sort((a, b) => a.confidence - b.confidence)[0].dimension;
  }
  if (state.phase === 'confirm') {
    return scored.sort((a, b) => a.count - b.count)[0].dimension;
  }
  return scored[0].dimension;
}

function selectNextQuestion() {
  const state = adaptiveState;
  const phase = determinePhase();
  state.phase = phase;

  if (phase === 'validity') {
    const validityQs = questionPool.filter(q =>
      q.dimension === 'validity' && !state.askedQuestions.includes(q.id)
    );
    return validityQs[0] || null;
  }

  const targetDimension = selectNextDimension();
  state.currentDimension = targetDimension;

  const candidates = questionPool.filter(q => {
    if (q.dimension === 'validity') return false;
    if (state.askedQuestions.includes(q.id)) return false;
    if (q.dimension !== targetDimension) return false;
    return true;
  });

  if (candidates.length === 0) {
    const otherDim = ['stress', 'emotion', 'social', 'decision']
      .find(d => d !== targetDimension);
    state.currentDimension = otherDim;
    return questionPool.find(q =>
      q.dimension === otherDim && !state.askedQuestions.includes(q.id)
    ) || null;
  }

  const scored = candidates.map(q => {
    let priority = 0;
    const coverage = state.subfacetCoverage[targetDimension] || {};
    if (!coverage[q.subfacet]) priority += 100;
    if (phase === 'explore' && q.difficulty === 'easy') priority += 50;
    if (phase === 'discriminate' && q.difficulty === 'boundary') priority += 50;
    if (phase === 'confirm' && q.difficulty === 'extreme') priority += 50;
    const avgScore = state.dimensionAnswers[targetDimension].length > 0
      ? state.dimensionAnswers[targetDimension].reduce((s, v) => s + v, 0) / state.dimensionAnswers[targetDimension].length
      : 3;
    const currentLeaning = avgScore >= 3 ? 'fight' : 'escape';
    if (q.leaning !== currentLeaning && q.leaning !== 'neutral') priority += 20;
    return { question: q, priority };
  });

  scored.sort((a, b) => b.priority - a.priority);
  return scored[0].question;
}

// ── Results ────────────────────────────────────────────
function checkValidity(validityAnswers) {
  if (validityAnswers.length === 0) return false;
  const incorrect = validityAnswers.filter(a => a.actual !== a.expected);
  return incorrect.length >= 2;
}

function showResult() {
  const state = adaptiveState;
  const dimensionIndices = {
    stress: calculateDimensionIndex(state.dimensionAnswers.stress),
    emotion: calculateDimensionIndex(state.dimensionAnswers.emotion),
    social: calculateDimensionIndex(state.dimensionAnswers.social),
    decision: calculateDimensionIndex(state.dimensionAnswers.decision)
  };
  const compositeScores = calculateCompositeScores(dimensionIndices);
  const overallScore = calculateOverallScore(compositeScores);
  const archetypeKey = getArchetypeKey(dimensionIndices);
  const archetype = archetypes[archetypeKey];
  const validityFailed = checkValidity(state.validityAnswers);
  renderResultPage(dimensionIndices, compositeScores, overallScore, archetype, validityFailed);
  setUrlParam('r', archetypeKey);
}

function getArchetypeKey(indices) {
  const rawAllLow = ['stress', 'emotion', 'social', 'decision'].every(d => {
    const answers = adaptiveState.dimensionAnswers[d];
    return answers.length > 0 && answers.reduce((s, v) => s + v, 0) / answers.length <= 1.5;
  });
  const rawAllHigh = ['stress', 'emotion', 'social', 'decision'].every(d => {
    const answers = adaptiveState.dimensionAnswers[d];
    return answers.length > 0 && answers.reduce((s, v) => s + v, 0) / answers.length >= 4.5;
  });
  if (rawAllLow) return 'special_1';
  if (rawAllHigh) return 'special_2';

  const key = [
    indices.stress >= 50 ? '1' : '0',
    indices.emotion >= 50 ? '1' : '0',
    indices.social >= 50 ? '1' : '0',
    indices.decision >= 50 ? '1' : '0'
  ].join('');
  return key;
}

function renderResultPage(dimensionIndices, compositeScores, overallScore, archetype, validityFailed) {
  const validityWarning = validityFailed ? `
    <div class="result-card" style="border-color: var(--vermilion);">
      <div class="result-section">
        <div class="result-label" style="color: var(--vermilion);">⚠ 作答质量提醒</div>
        <div class="result-text">本次作答可能存在随意填写的情况，结果仅供参考。建议重新认真作答一次。</div>
      </div>
    </div>
  ` : '';

  const resultHTML = `
    <div class="result-header">
      <div class="corner-seal">已鑒</div>
      <div class="result-type">${archetype.typeCode}</div>
      <div class="result-name">${archetype.name}</div>
      <div class="result-subtitle">${archetype.subtitle}</div>
    </div>

    ${validityWarning}

    <div class="result-card">
      <div class="result-section">
        <div class="result-label">灵魂肖像</div>
        <div class="result-text">${archetype.desc}</div>
      </div>
      <div class="result-section">
        <div class="result-label">人生指引</div>
        <div class="result-text">${archetype.guidance}</div>
      </div>
      <div class="result-section">
        <div class="result-label">哲思</div>
        <div class="result-text" style="font-style:italic">"${archetype.insight}"</div>
      </div>
    </div>

    <div class="result-card">
      <div class="result-section">
        <div class="result-label">维度分析</div>
        ${renderDimensionBars(dimensionIndices)}
      </div>
    </div>

    <div class="result-card">
      <div class="result-section">
        <div class="result-label">综合指数</div>
        ${renderCompositeScores(compositeScores, overallScore)}
      </div>
    </div>

    <button class="btn btn-restart" onclick="restartQuiz()">重新测试</button>

    <div class="share-section">
      <div class="share-title">─── 分享你的结果 ───</div>
      <div class="share-buttons">
        <button class="btn-share" onclick="copyShareLink()">复制链接</button>
        <button class="btn-share" onclick="generateShareImage()">保存图片</button>
      </div>
      <div class="share-toast" id="share-toast"></div>
    </div>
  `;

  document.getElementById('screen-result').innerHTML = resultHTML;
  showScreen('result');
}

function copyShareLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('链接已复制，快去分享吧');
  }).catch(() => {
    const input = document.createElement('input');
    input.value = url;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    showToast('链接已复制，快去分享吧');
  });
}

function showToast(msg) {
  const toast = document.getElementById('share-toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function generateShareImage() {
  const shareCanvas = document.createElement('canvas');
  const sw = 800, sh = 1200;
  shareCanvas.width = sw;
  shareCanvas.height = sh;
  const sctx = shareCanvas.getContext('2d');

  // 获取当前结果数据
  const nameEl = document.querySelector('.result-name');
  const typeEl = document.querySelector('.result-type');
  const subtitleEl = document.querySelector('.result-subtitle');
  const name = nameEl ? nameEl.textContent : '未知';
  const typeCode = typeEl ? typeEl.textContent : '';
  const subtitle = subtitleEl ? subtitleEl.textContent : '';

  // 读取灵魂肖像（截取前100字）和哲思
  const resultTexts = document.querySelectorAll('.result-text');
  const soulPortrait = resultTexts.length > 0 ? resultTexts[0].textContent.substring(0, 100) + '…' : '';
  const insight = resultTexts.length > 2 ? resultTexts[2].textContent : '';

  // 背景
  sctx.fillStyle = '#e9e2d0';
  sctx.fillRect(0, 0, sw, sh);

  // 纸纹噪点
  for (let i = 0; i < 6000; i++) {
    const x = Math.random() * sw;
    const y = Math.random() * sh;
    sctx.fillStyle = `rgba(120,90,40,${Math.random() * 0.04})`;
    sctx.fillRect(x, y, 1, 1);
  }

  // 双线上框
  sctx.strokeStyle = '#1f1810';
  sctx.lineWidth = 2;
  sctx.beginPath();
  sctx.moveTo(50, 40);
  sctx.lineTo(sw - 50, 40);
  sctx.stroke();
  sctx.beginPath();
  sctx.moveTo(50, 46);
  sctx.lineTo(sw - 50, 46);
  sctx.stroke();

  // 双线下框（位置在 onload 中动态绘制）

  // 标题
  sctx.fillStyle = '#1f1810';
  sctx.font = 'bold 36px "Noto Serif SC", serif';
  sctx.textAlign = 'center';
  sctx.fillText('精神状态鉴定中心', sw / 2, 100);

  // 分隔线
  sctx.strokeStyle = '#b3a684';
  sctx.lineWidth = 1;
  sctx.beginPath();
  sctx.moveTo(200, 130);
  sctx.lineTo(sw - 200, 130);
  sctx.stroke();

  // 类型码
  sctx.fillStyle = '#a8321f';
  sctx.font = '24px "Noto Serif SC", serif';
  sctx.fillText(typeCode, sw / 2, 180);

  // 人格名称（大字）
  sctx.fillStyle = '#1f1810';
  sctx.font = 'bold 56px "Noto Serif SC", serif';
  sctx.fillText(name, sw / 2, 260);

  // 副标题
  sctx.fillStyle = '#4a3f30';
  sctx.font = '24px "Noto Serif SC", serif';
  sctx.fillText(subtitle, sw / 2, 320);

  // 分隔线
  sctx.strokeStyle = '#b3a684';
  sctx.beginPath();
  sctx.moveTo(200, 360);
  sctx.lineTo(sw - 200, 360);
  sctx.stroke();

  // 灵魂肖像标签
  sctx.fillStyle = '#a8321f';
  sctx.font = 'bold 20px "Noto Serif SC", serif';
  sctx.textAlign = 'left';
  sctx.fillText('灵魂肖像', 80, 410);

  // 灵魂肖像内容（自动换行）
  sctx.fillStyle = '#1f1810';
  sctx.font = '18px "Noto Serif SC", serif';
  const maxLineWidth = sw - 160;
  const lines = wrapText(sctx, soulPortrait, maxLineWidth);
  lines.forEach((line, i) => {
    sctx.fillText(line, 80, 445 + i * 28);
  });

  // 哲思标签
  const insightY = 445 + lines.length * 28 + 20;
  sctx.fillStyle = '#a8321f';
  sctx.font = 'bold 20px "Noto Serif SC", serif';
  sctx.textAlign = 'left';
  sctx.fillText('哲思', 80, insightY);

  // 哲思内容
  sctx.fillStyle = '#4a3f30';
  sctx.font = 'italic 18px "Noto Serif SC", serif';
  const insightLines = wrapText(sctx, `"${insight}"`, maxLineWidth);
  insightLines.forEach((line, i) => {
    sctx.fillText(line, 80, insightY + 35 + i * 28);
  });

  // 底部分隔线 — 在二维码区域上方
  const qrAreaTop = insightY + 35 + insightLines.length * 28 + 30;
  sctx.strokeStyle = '#b3a684';
  sctx.beginPath();
  sctx.moveTo(200, qrAreaTop);
  sctx.lineTo(sw - 200, qrAreaTop);
  sctx.stroke();

  // 二维码（使用 API 生成）
  const baseUrl = window.location.origin + window.location.pathname;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(baseUrl)}`;
  const qrImg = new Image();
  qrImg.crossOrigin = 'anonymous';
  qrImg.onload = function() {
    const qrSize = 120;
    const qrX = sw / 2 - qrSize / 2;
    const qrY = qrAreaTop + 25;

    // 二维码背景（纸色，覆盖白色底色）
    sctx.fillStyle = '#e9e2d0';
    sctx.fillRect(qrX - 8, qrY - 8, qrSize + 16, qrSize + 16);
    sctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

    // 网址文字
    sctx.fillStyle = '#4a3f30';
    sctx.font = '16px "Noto Serif SC", serif';
    sctx.textAlign = 'center';
    sctx.fillText('扫码测测你是什么品种的精神状态', sw / 2, qrY + qrSize + 28);

    // 裁剪 canvas 到实际内容高度（去掉底部空白）
    const contentBottom = qrY + qrSize + 60;
    const finalH = Math.min(contentBottom + 30, sh);
    const cropped = document.createElement('canvas');
    cropped.width = sw;
    cropped.height = finalH;
    cropped.getContext('2d').drawImage(shareCanvas, 0, 0, sw, finalH, 0, 0, sw, finalH);

    // 在裁剪后的 canvas 上画底部双线框和印章
    const cctx = cropped.getContext('2d');
    cctx.strokeStyle = '#1f1810';
    cctx.lineWidth = 2;
    cctx.beginPath();
    cctx.moveTo(50, finalH - 40);
    cctx.lineTo(sw - 50, finalH - 40);
    cctx.stroke();
    cctx.beginPath();
    cctx.moveTo(50, finalH - 46);
    cctx.lineTo(sw - 50, finalH - 46);
    cctx.stroke();

    // 右下角印章
    cctx.save();
    cctx.translate(sw - 110, finalH - 80);
    cctx.rotate(7 * Math.PI / 180);
    cctx.strokeStyle = '#a8321f';
    cctx.lineWidth = 2.5;
    cctx.strokeRect(-28, -28, 56, 56);
    cctx.fillStyle = '#a8321f';
    cctx.font = 'bold 22px serif';
    cctx.textAlign = 'center';
    cctx.textBaseline = 'middle';
    cctx.fillText('鑒定', 0, 0);
    cctx.restore();

    // 下载
    const link = document.createElement('a');
    link.download = `精神鉴定-${name}.png`;
    link.href = cropped.toDataURL('image/png');
    link.click();
    showToast('图片已保存');
  };
  qrImg.onerror = function() {
    // 二维码加载失败时，直接下载不含二维码的图片
    const link = document.createElement('a');
    link.download = `精神鉴定-${name}.png`;
    link.href = shareCanvas.toDataURL('image/png');
    link.click();
    showToast('图片已保存');
  };
  qrImg.src = qrUrl;
}

// Canvas 文字自动换行辅助函数
function wrapText(ctx, text, maxWidth) {
  const lines = [];
  let currentLine = '';
  for (let i = 0; i < text.length; i++) {
    const testLine = currentLine + text[i];
    if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = text[i];
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);
  return lines;
}

function renderDimensionBars(dimensionIndices) {
  const dimensions = [
    { key: 'stress', name: '压力应对', min: '逃避', max: '抗争' },
    { key: 'emotion', name: '情绪管理', min: '压抑', max: '宣泄' },
    { key: 'social', name: '社交模式', min: '疏离', max: '连接' },
    { key: 'decision', name: '决策方式', min: '理性', max: '感性' }
  ];

  return dimensions.map(dim => `
    <div class="progress-bar-container">
      <div class="progress-label">
        <span>${dim.min}</span>
        <span class="progress-value">${dimensionIndices[dim.key]}%</span>
        <span>${dim.max}</span>
      </div>
      <div class="dim-progress-bar">
        <div class="dim-progress-fill" style="width: ${dimensionIndices[dim.key]}%"></div>
      </div>
      <div class="progress-label">
        <span>${dim.name}</span>
      </div>
    </div>
  `).join('');
}

function renderCompositeScores(compositeScores, overallScore) {
  const scoreLevel = getScoreLevel(overallScore);

  return `
    <div class="overall-score">
      <div class="score-number">${overallScore}</div>
      <div class="score-label">${scoreLevel.level}</div>
      <div class="score-description">${scoreLevel.description}</div>
    </div>

    <div class="composite-scores">
      <div class="composite-item">
        <span class="composite-label">社会适应度</span>
        <span class="composite-value">${compositeScores.socialAdapt}%</span>
      </div>
      <div class="composite-item">
        <span class="composite-label">心理健康度</span>
        <span class="composite-value">${compositeScores.mentalHealth}%</span>
      </div>
      <div class="composite-item">
        <span class="composite-label">情绪稳定性</span>
        <span class="composite-value">${compositeScores.emotionalStability}%</span>
      </div>
      <div class="composite-item">
        <span class="composite-label">社交健康度</span>
        <span class="composite-value">${compositeScores.socialHealth}%</span>
      </div>
      <div class="composite-item">
        <span class="composite-label">决策健康度</span>
        <span class="composite-value">${compositeScores.decisionHealth}%</span>
      </div>
    </div>
  `;
}

function getScoreLevel(score) {
  if (score >= 90) {
    return { level: '圣人级', description: '你已经超越了世俗的烦恼，达到了精神自由的境界' };
  } else if (score >= 80) {
    return { level: '人间清醒', description: '你看透了世界的荒诞，但依然选择温柔地活着' };
  } else if (score >= 70) {
    return { level: '正常人类', description: '你和大多数人一样，在崩溃和自愈之间反复横跳' };
  } else if (score >= 60) {
    return { level: '轻微内耗', description: '你有一些精神内耗，但还能维持基本功能' };
  } else if (score >= 50) {
    return { level: '中度内耗', description: '你的精神状态有点糟，需要关注一下' };
  } else if (score >= 40) {
    return { level: '重度内耗', description: '你已经在崩溃的边缘，建议寻求帮助' };
  } else if (score >= 30) {
    return { level: '精神濒危', description: '你的精神状态需要紧急干预' };
  } else {
    return { level: '已死但还在呼吸', description: '你的精神已经死亡，但肉体还在打卡' };
  }
}

// ── 初始化 ──────────────────────────────────────
const shareKey = getUrlParam('r');
if (shareKey && archetypes[shareKey]) {
  // 直接展示分享的结果，跳过答题
  const archetype = archetypes[shareKey];
  renderResultPage(
    { stress: 50, emotion: 50, social: 50, decision: 50 },
    { socialAdapt: 50, mentalHealth: 50, emotionalStability: 50, socialHealth: 50, decisionHealth: 50 },
    50,
    archetype
  );
} else {
  renderIntro();
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
